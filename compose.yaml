services:
  mysql:
    image: mysql:8.4
    profiles: [mysql]
    ports: ["0:3306"]
    tmpfs: /var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-testpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-testdb}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 512m

  postgresql:
    image: postgres:16
    profiles: [postgresql]
    ports: ["0:5432"]
    tmpfs: /var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASSWORD:-testpass}
      POSTGRES_DB: ${PG_DATABASE:-testdb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 256m

  mariadb:
    image: mariadb:11.4
    profiles: [mariadb]
    ports: ["0:3306"]
    tmpfs: /var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-testpass}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-testdb}
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 512m

  mssql:
    image: ${MSSQL_IMAGE:-mcr.microsoft.com/mssql/server:2022-latest}
    profiles: [mssql]
    ports: ["0:1433"]
    tmpfs: /var/opt/mssql/data
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-TestPass123!}
      MSSQL_PID: Express
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${MSSQL_SA_PASSWORD:-TestPass123!}\" -Q \"SELECT 1\" -No"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 30s
    mem_limit: 2g
