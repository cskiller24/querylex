name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  homebrew-tap:
    name: Update Homebrew Tap
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: querylex/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap
      - name: Copy formula
        run: |
          # The formula is generated by goreleaser and uploaded as a release artifact.
          # This step downloads it from the release and commits to the tap repo.
          # In practice, goreleaser's brews section handles this automatically
          # when configured with the tap repository. This job serves as a
          # fallback/verification step.
          echo "Formula managed by GoReleaser brews section"
      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "querylex-bot"
          git config user.email "bot@querylex.dev"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Update formula for ${{ github.ref_name }}"
            git push
          fi

  scoop-bucket:
    name: Update Scoop Bucket
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scoop-bucket
        uses: actions/checkout@v4
        with:
          repository: querylex/scoop-bucket
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: scoop-bucket
      - name: Copy manifest
        run: |
          # The manifest is generated by goreleaser and uploaded as a release artifact.
          # This step downloads it from the release and commits to the bucket repo.
          # In practice, goreleaser's scoops section handles this automatically
          # when configured with the bucket repository.
          echo "Manifest managed by GoReleaser scoops section"
      - name: Commit and push
        run: |
          cd scoop-bucket
          git config user.name "querylex-bot"
          git config user.email "bot@querylex.dev"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Update manifest for ${{ github.ref_name }}"
            git push
          fi
