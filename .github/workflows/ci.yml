name: CI

on:
  push:
    branches: [master, "1.x"]
  pull_request:
    branches: [master, "1.x"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
      - name: Run go vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
      - name: Run tests
        run: go test ./... -short -count=1

  snapshot:
    name: Snapshot Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --snapshot --clean

