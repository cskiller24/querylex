# .goreleaser.yaml
# Phase 6: Cross-platform build matrix with archives, nfpms, brews, scoops.
project_name: querylex

before:
  hooks:
    - go run ./cmd/generate_completions/

builds:
  - id: querylex
    main: ./cmd/querylex/
    binary: querylex
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/querylex/querylex/internal/version.Version={{.Version}}
      - -X github.com/querylex/querylex/internal/version.Commit={{.Commit}}
      - -X github.com/querylex/querylex/internal/version.BuildDate={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: querylex-add-db
    main: ./cmd/querylex-add-db/
    binary: querylex-add-db
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/querylex/querylex/internal/version.Version={{.Version}}
      - -X github.com/querylex/querylex/internal/version.Commit={{.Commit}}
      - -X github.com/querylex/querylex/internal/version.BuildDate={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: querylex-stats
    main: ./cmd/querylex-stats/
    binary: querylex-stats
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/querylex/querylex/internal/version.Version={{.Version}}
      - -X github.com/querylex/querylex/internal/version.Commit={{.Commit}}
      - -X github.com/querylex/querylex/internal/version.BuildDate={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md
      - completions/*

nfpms:
  - package_name: querylex
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [deb, rpm]
    vendor: Querylex
    homepage: "https://github.com/querylex/querylex"
    maintainer: "Querylex Team"
    description: "AI-augmented SQL generation and optimization CLI"
    license: MIT
    contents:
      - src: ./completions/querylex.bash
        dst: /usr/share/bash-completion/completions/querylex
      - src: ./completions/querylex.zsh
        dst: /usr/share/zsh/site-functions/_querylex
      - src: ./completions/querylex.fish
        dst: /usr/share/fish/vendor_completions.d/querylex.fish

brews:
  - name: querylex
    repository:
      owner: querylex
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/querylex/querylex"
    description: "AI-augmented SQL generation and optimization CLI"
    license: MIT
    caveats: |
      To enable shell completions:
        querylex completion bash > $(brew --prefix)/etc/bash_completion.d/querylex
        querylex completion zsh > $(brew --prefix)/share/zsh/site-functions/_querylex
        querylex completion fish > $(brew --prefix)/share/fish/vendor_completions.d/querylex.fish

scoops:
  - name: querylex
    repository:
      owner: querylex
      name: scoop-bucket
    directory: bucket
    homepage: "https://github.com/querylex/querylex"
    description: "AI-augmented SQL generation and optimization CLI"
    license: MIT
