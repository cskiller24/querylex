services:
  mysql:
    build:
      context: .
      dockerfile: Dockerfile.mysql
    container_name: tpch-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: tpch
      MYSQL_USER: tpch
      MYSQL_PASSWORD: tpch
    ports:
      - "3307:3306"
    volumes:
      - ./data:/tpch-data:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 30

