services:
  mysql:
    build:
      context: .
      dockerfile: Dockerfile.mysql
    container_name: tpch-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: tpch
      MYSQL_USER: tpch
      MYSQL_PASSWORD: tpch
    ports:
      - "3307:3306"
    volumes:
      - ./data:/tpch-data:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 30

  postgresql:
    image: postgres:16
    container_name: tpch-postgresql
    environment:
      POSTGRES_DB: tpch
      POSTGRES_USER: tpch
      POSTGRES_PASSWORD: tpch
    ports:
      - "5433:5432"
    volumes:
      - ./data:/tpch-data:ro
      - ./init/postgresql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tpch -d tpch"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: |
      -c shared_buffers=512MB
      -c work_mem=64MB
      -c effective_cache_size=2GB
      -c maintenance_work_mem=256MB
      -c max_wal_size=2GB
